version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: cv_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: cv_management
      MYSQL_USER: cv_user
      MYSQL_PASSWORD: cv_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend API
  backend:
    build: ./backend
    container_name: cv_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://cv_user:cv_password@mysql:3306/cv_management
      HOST: 0.0.0.0
      PORT: 8000
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # Frontend
  frontend:
    build: ./frontend
    container_name: cv_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data:
